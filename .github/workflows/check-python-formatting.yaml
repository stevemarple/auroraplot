name: Check Python files are formatted correctly

on: pull_request

jobs:
  check_python_formatting:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Black
        run: pip install black

      - name: Check code formatting with Black
        run: black --check --line-length 120 .
